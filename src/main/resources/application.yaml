spring:
  application:
    name: ScheduledTaskBot
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true
  profiles:
    active: dev
logging:
  level:
    root: INFO
  file:
    name: /var/logs/ScheduledTaskBot/application.log
  structured:
    format:
      console: ecs
      file: ecs
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB

server:
  port: 1478
  servlet:
    context-path: /scheduled-task-bot-bot